<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top 50 Claude Skills for Marketers</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0e0d;
    --paper: #f5f0e8;
    --cream: #ede7d7;
    --accent: #c8402a;
    --accent2: #2a6e4a;
    --muted: #7a7060;
    --line: #d4cbb8;
    --tag-bg: #e8e0cd;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
  }

  /* MASTHEAD */
  .masthead {
    border-bottom: 3px double var(--ink);
    padding: 32px 40px 24px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 16px;
  }

  .issue-line {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 56px);
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -0.02em;
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-top: 10px;
    border-left: 2px solid var(--accent);
    padding-left: 10px;
  }

  .count-badge {
    font-family: 'Playfair Display', serif;
    font-size: 72px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    opacity: 0.15;
    align-self: start;
  }

  /* CONTROLS */
  .controls {
    padding: 20px 40px;
    border-bottom: 1px solid var(--line);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    background: var(--cream);
  }

  .filter-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 4px;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 14px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.15s;
    border-radius: 2px;
  }

  .filter-btn:hover { background: var(--ink); color: var(--paper); }
  .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  .search-box {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 6px 14px;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink);
    outline: none;
    width: 220px;
    border-radius: 2px;
  }

  .search-box:focus { border-color: var(--accent); }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 0;
    padding: 0 40px;
  }

  .card {
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 24px;
    position: relative;
    transition: background 0.15s;
    cursor: default;
  }

  .card:hover { background: var(--cream); }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }

  .skill-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
  }

  .skill-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.25;
    flex: 1;
  }

  .skill-desc {
    font-size: 13px;
    color: #3a3530;
    line-height: 1.55;
    margin-left: 40px;
    margin-bottom: 12px;
  }

  .card-footer {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: 40px;
    flex-wrap: wrap;
  }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    background: var(--tag-bg);
    border-radius: 2px;
    color: var(--muted);
  }

  .tag.cat-content { background: #dcecd6; color: #2a6e4a; }
  .tag.cat-strategy { background: #fde8d4; color: #b54a1a; }
  .tag.cat-research { background: #d4e4f0; color: #1a5080; }
  .tag.cat-social { background: #e8d4f0; color: #6a2090; }
  .tag.cat-email { background: #f0e8d4; color: #806020; }
  .tag.cat-brand { background: #f0d4d4; color: #802020; }
  .tag.cat-analytics { background: #d4f0e8; color: #206050; }
  .tag.cat-ops { background: #e8e8d4; color: #606020; }

  .copy-prompt {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border: 1px solid var(--line);
    background: transparent;
    cursor: pointer;
    color: var(--muted);
    border-radius: 2px;
    transition: all 0.15s;
  }

  .copy-prompt:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .copy-prompt.copied { background: var(--accent2); color: white; border-color: var(--accent2); }

  .prompt-text {
    display: none;
    margin-left: 40px;
    margin-top: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    line-height: 1.6;
    color: var(--ink);
    background: var(--ink);
    color: #d4f0d4;
    padding: 14px;
    border-radius: 3px;
    border-left: 3px solid var(--accent2);
    white-space: pre-wrap;
  }

  .card.expanded .prompt-text { display: block; }

  .show-prompt {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--accent);
    padding: 0;
    margin-left: 40px;
    margin-top: 8px;
    display: block;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .card.hidden { display: none; }

  .no-results {
    padding: 60px 40px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--muted);
    font-size: 20px;
    grid-column: 1/-1;
  }

  /* FOOTER */
  .footer {
    border-top: 3px double var(--ink);
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-text {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .visible-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.08em;
  }

  @media (max-width: 600px) {
    .masthead, .controls, .grid, .footer { padding-left: 20px; padding-right: 20px; }
    .grid { grid-template-columns: 1fr; }
    .count-badge { display: none; }
    .search-box { width: 100%; margin-left: 0; }
  }
</style>
</head>
<body>

<header class="masthead">
  <div>
    <div class="issue-line">The Marketer's Field Guide · Claude Edition · 2026</div>
    <h1>50 Claude Skills<br>for <em>Marketers</em></h1>
    <p class="subtitle">Prompts, use cases & starter templates — organized by discipline</p>
  </div>
  <div class="count-badge">50</div>
</header>

<div class="controls">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" data-cat="all">All</button>
  <button class="filter-btn" data-cat="content">Content</button>
  <button class="filter-btn" data-cat="strategy">Strategy</button>
  <button class="filter-btn" data-cat="research">Research</button>
  <button class="filter-btn" data-cat="social">Social</button>
  <button class="filter-btn" data-cat="email">Email</button>
  <button class="filter-btn" data-cat="brand">Brand</button>
  <button class="filter-btn" data-cat="analytics">Analytics</button>
  <button class="filter-btn" data-cat="ops">Ops</button>
  <input class="search-box" type="text" placeholder="Search skills..." id="searchInput">
</div>

<div class="grid" id="grid"></div>

<footer class="footer">
  <span class="footer-text">Click "Show prompt" on any card to see a starter template</span>
  <span class="visible-count" id="visibleCount">50 skills shown</span>
</footer>

<script>
const skills = [
  // CONTENT
  { n:1, title:"Blog Post Drafting", cat:"content", desc:"Go from headline to 800-word draft in one prompt. Works best when you give Claude your target keyword, audience, and one contrarian angle.", prompt:"Write a 700-word blog post for [audience] about [topic]. Lead with a contrarian hook. Use H2s. Tone: [voice]. Target keyword: [keyword]. End with a CTA to [action]." },
  { n:2, title:"Content Repurposing Engine", cat:"content", desc:"Turn one long-form asset into 10 formats: LinkedIn post, tweet thread, email, FAQ, quote card copy, short video script, and more.", prompt:"I have this article: [PASTE]. Repurpose it into: 1) A LinkedIn post (200 words), 2) A 5-tweet thread, 3) A 3-email nurture sequence, 4) 3 pull quotes for social graphics, 5) A 60-second video script." },
  { n:3, title:"SEO Brief Generator", cat:"content", desc:"Feed Claude a keyword and get a full content brief: audience intent, H1/H2 structure, semantic keywords, competitor angles to beat.", prompt:"Create a detailed SEO content brief for the keyword '[keyword]'. Include: search intent, recommended title, meta description, H2 outline, 10 semantic keywords, and 3 competitor angles to differentiate from." },
  { n:4, title:"Case Study Writer", cat:"content", desc:"Structure messy client wins into a tight Problem > Solution > Results narrative with stats pulled to the front.", prompt:"Write a B2B case study using this format: 1) Client snapshot (2 sentences), 2) The challenge (1 paragraph), 3) Our approach (3 bullets), 4) Results (lead with the biggest metric), 5) Client quote placeholder. Here are the raw notes: [PASTE]." },
  { n:5, title:"Product Description Copy", cat:"content", desc:"Write benefit-led, conversion-optimized product copy at any length — from 25-word snippets to full landing page sections.", prompt:"Write a product description for [product]. Audience: [ICP]. Primary benefit: [benefit]. Tone: [voice]. Length: [short/medium/long]. Avoid: jargon, passive voice, feature-first framing." },
  { n:6, title:"Thought Leadership Articles", cat:"content", desc:"Claude can write in your voice if you give it 3–5 examples of past writing. Great for ghostwriting exec bylines.", prompt:"You are ghostwriting for [name/title]. Here are 3 examples of their writing style: [PASTE EXAMPLES]. Now write a 600-word LinkedIn article on [topic] from their POV. Do not use em dashes. No filler phrases." },
  { n:7, title:"Landing Page Copy", cat:"content", desc:"Full-page copy architecture: hero headline variants, subhead, benefit bullets, social proof placement, FAQ, and CTA.", prompt:"Write landing page copy for [offer]. Above the fold: 3 headline variants + subhead. Body: 3 benefit sections (problem → solution → proof). Add a 4-question FAQ and 2 CTA variations." },
  { n:8, title:"Video Script Writing", cat:"content", desc:"Structure scripts for YouTube, TikTok, webinars, or product demos — with hook, body, and CTA pacing built in.", prompt:"Write a [duration]-second video script for [platform] about [topic]. Open with a pattern-interrupt hook. Use short punchy sentences for VO. End with a clear CTA: [action]. Tone: [voice]." },
  { n:9, title:"Newsletter Writing", cat:"email", desc:"Craft a full newsletter issue — intro, main story, 3 quick links with commentary, and a sign-off that sounds human.", prompt:"Write a weekly newsletter issue for [audience]. Include: 1) A 100-word personal opener about [theme], 2) One main insight (300 words), 3) 3 curated links with 2-sentence commentary each, 4) A closing line. Voice: [voice]." },
  { n:10, title:"Email Subject Line Testing", cat:"email", desc:"Generate 10 subject line variants across different psychological triggers — curiosity, urgency, social proof, direct benefit — with notes on each.", prompt:"Write 10 subject line variants for an email about [topic] to [audience]. Cover these angles: curiosity gap, urgency, direct benefit, social proof, question, contrarian, number-led. Add a 1-sentence rationale for each." },

  // STRATEGY
  { n:11, title:"Go-to-Market Strategy Draft", cat:"strategy", desc:"Outline a GTM strategy with ICP definition, positioning statement, channel mix, messaging pillars, and 90-day milestones.", prompt:"Draft a GTM strategy for [product/service]. Include: ICP definition, positioning statement (fill-in-the-blank template), top 3 channels with rationale, 3 messaging pillars, and a 90-day launch plan in phases." },
  { n:12, title:"Competitive Positioning Map", cat:"strategy", desc:"Give Claude 3–5 competitor URLs or descriptions and get a positioning gap analysis with differentiation angles.", prompt:"Here are [X] competitors and their positioning: [PASTE]. Analyze: 1) What space each owns, 2) Common claims everyone makes (avoid these), 3) White space we can own, 4) A differentiated positioning statement for us." },
  { n:13, title:"ICP (Ideal Customer Profile) Builder", cat:"strategy", desc:"Go beyond demographics. Claude builds psychographic profiles with pain points, watering holes, objections, and buying triggers.", prompt:"Build a detailed ICP for [product]. Beyond demographics, include: core frustrations, what they've already tried, where they consume content, what a successful outcome looks like to them, and their #1 objection to buying." },
  { n:14, title:"Messaging Framework", cat:"strategy", desc:"Structure your brand's messaging into a hierarchy: category claim, proof points, supporting messages per segment, and objection handlers.", prompt:"Build a messaging framework for [brand/product]. Structure: 1) Overarching value proposition, 2) 3 proof-point pillars, 3) Segment-specific messages for [segment A] and [segment B], 4) Top 3 objections and responses." },
  { n:15, title:"Campaign Concept Generator", cat:"strategy", desc:"Brief Claude on a goal, audience, and product, and get 5 campaign concepts with names, core mechanics, and creative direction.", prompt:"Generate 5 distinct campaign concepts for [brand] targeting [audience] with the goal of [objective]. For each: campaign name, 1-line concept, creative hook, suggested channels, and one unconventional element." },
  { n:16, title:"Quarterly Marketing Plan", cat:"strategy", desc:"Turn your goals into a structured quarterly plan with themes, key initiatives, KPIs, resource needs, and weekly cadence.", prompt:"Build a Q[X] marketing plan for [company]. Goals: [goals]. Budget context: [context]. Include: quarterly theme, 4–5 key initiatives with owner placeholders, KPIs per initiative, and a month-by-month focus breakdown." },
  { n:17, title:"Budget Allocation Framework", cat:"strategy", desc:"Claude can model different budget split scenarios (brand vs. demand, channels, tiers) with rationale based on your stage and goals.", prompt:"We have a $[X] quarterly marketing budget. Stage: [early/growth/scale]. Primary goal: [goal]. Recommend a budget allocation across channels with percentage splits and strategic rationale for each." },
  { n:18, title:"OKR Writing for Marketing", cat:"strategy", desc:"Translate vague marketing goals into tight OKRs with measurable key results and tracking cadence.", prompt:"Convert these marketing goals into OKRs: [PASTE GOALS]. For each Objective, write 3 Key Results that are measurable, time-bound, and ambitious but achievable. Include a suggested review cadence." },

  // RESEARCH
  { n:19, title:"Market Research Synthesis", cat:"research", desc:"Paste raw research findings, interviews, or reports and get a structured synthesis: themes, insights, gaps, and implications.", prompt:"Synthesize this market research into: 1) Top 5 themes with supporting evidence, 2) Surprising or counterintuitive findings, 3) Gaps the data doesn't answer, 4) Strategic implications for a [type] company." },
  { n:20, title:"Audience Persona Development", cat:"research", desc:"Build rich personas from qualitative inputs — interview transcripts, survey data, CRM notes — not just demographic templates.", prompt:"Based on these customer interview notes: [PASTE], build 2 detailed personas. Include: name/role, goals, frustrations, information sources, decision-making style, and a quote that captures their worldview." },
  { n:21, title:"Trend Report Digest", cat:"research", desc:"Feed Claude long industry reports and get a 1-page executive digest with the 5 most actionable insights for your context.", prompt:"Summarize this industry report for a [company type] marketing leader. Extract: 5 most relevant trends, 3 threats to watch, 2 opportunities to act on now, and a recommended first move. Report: [PASTE]." },
  { n:22, title:"Customer Review Mining", cat:"research", desc:"Paste G2, Trustpilot, or Amazon reviews and Claude finds the language patterns, recurring pain points, and copy gold.", prompt:"Analyze these [X] customer reviews: [PASTE]. Identify: 1) Top 5 reasons people buy, 2) Top 5 frustrations, 3) Language patterns to use in copy, 4) Objections that show up repeatedly, 5) Emotional drivers beneath the functional complaints." },
  { n:23, title:"Interview Question Design", cat:"research", desc:"Build a customer or prospect interview guide with open-ended questions mapped to specific learning objectives.", prompt:"Design a 45-minute customer interview guide for [research goal]. Include a warm-up section, 3 thematic question clusters with follow-up probes, and a closing section. Avoid leading questions. Focus on behaviors, not opinions." },
  { n:24, title:"Survey Design", cat:"research", desc:"Structure surveys that avoid bias, use proper scale types, and sequence questions for completion rate.", prompt:"Design a [X]-question survey to understand [research goal] for [audience]. Include a mix of NPS-style, Likert, and open-ended questions. Flag any questions that might introduce response bias." },

  // SOCIAL
  { n:25, title:"LinkedIn Content Calendar", cat:"social", desc:"Generate a 4-week LinkedIn content calendar for a personal brand or company page with post formats, angles, and hooks.", prompt:"Create a 4-week LinkedIn content calendar for [person/brand] in [industry]. Each week: 1 thought leadership post, 1 tactical post, 1 engagement post. Include post hook, format, and estimated length for each." },
  { n:26, title:"Twitter/X Thread Writing", cat:"social", desc:"Turn ideas, articles, or data points into structured threads with strong openers, numbered insights, and a closing CTA.", prompt:"Turn this idea into a 10-tweet thread: [IDEA or ARTICLE]. Tweet 1: bold, contrarian hook. Tweets 2–9: one insight each, short and punchy. Tweet 10: summary + CTA. No fluff. No 'a thread 🧵' clichés." },
  { n:27, title:"Social Media Bio Writing", cat:"social", desc:"Write platform-specific bios across LinkedIn, X, Instagram — each optimized for that platform's character limits and conventions.", prompt:"Write bios for [person/brand] for: LinkedIn (220 chars for tagline + 300-word About), X/Twitter (160 chars), Instagram (150 chars). Tone: [voice]. Emphasize: [core value prop]." },
  { n:28, title:"Community Engagement Templates", cat:"social", desc:"Build a library of response templates for community management — welcome messages, question answers, complaint handling, celebration posts.", prompt:"Create 10 community management response templates for [platform/community] covering: new member welcome, insightful question response, complaint acknowledgment, off-topic redirect, celebration of member win." },
  { n:29, title:"Hashtag Strategy", cat:"social", desc:"Build a tiered hashtag strategy by reach and relevance for any platform — with notes on when to use each tier.", prompt:"Build a hashtag strategy for [brand] on [platform]. Create 3 tiers: 1) Branded hashtags we own, 2) Niche community tags (under 500K), 3) Broad reach tags. Include 5 per tier and usage guidance." },
  { n:30, title:"Social Listening Analysis", cat:"social", desc:"Paste social listening exports or mentions and Claude identifies sentiment patterns, emerging conversations, and response priorities.", prompt:"Analyze these social mentions: [PASTE]. Identify: top sentiment themes, emerging conversations we should join, potential crises to monitor, and 3 content opportunities based on what the audience is talking about." },

  // EMAIL
  { n:31, title:"Cold Outreach Sequences", cat:"email", desc:"Write 3–5 email sequences for cold outreach with different angles per touch — value, social proof, pattern interrupt, and breakup email.", prompt:"Write a 5-email cold outreach sequence for [ICP] about [offer]. Email 1: value-led. Email 2: social proof. Email 3: case study angle. Email 4: pattern interrupt. Email 5: breakup. Keep each under 100 words." },
  { n:32, title:"Nurture Sequence Architecture", cat:"email", desc:"Map and write full nurture sequences for specific buyer stages — awareness, consideration, decision — with trigger logic suggestions.", prompt:"Build a 6-email nurture sequence for leads at the [awareness/consideration/decision] stage. For each email: subject line, send timing, goal, preview text, and full body copy. Product: [product]. Audience: [ICP]." },
  { n:33, title:"Re-engagement Campaigns", cat:"email", desc:"Write win-back campaigns for churned customers or dormant subscribers with compelling reasons to return.", prompt:"Write a 3-email re-engagement sequence for subscribers who haven't opened in 90 days. Email 1: empathy + value reminder. Email 2: new benefit or offer. Email 3: last chance + list hygiene message. Brand: [brand]." },
  { n:34, title:"Transactional Email Copy", cat:"email", desc:"Improve the marketing voice in transactional emails — confirmations, onboarding, receipts — without breaking their functional purpose.", prompt:"Rewrite this transactional email with better brand voice while keeping all functional information intact: [PASTE]. Target tone: [voice]. Add one moment of delight without being cheesy." },
  { n:35, title:"Email A/B Test Planning", cat:"email", desc:"Design structured A/B tests for email with hypothesis, variable, success metric, and minimum sample size guidance.", prompt:"Design 3 A/B test plans for our email program. For each: what we're testing, hypothesis, control vs. variant, primary success metric, and what we'll do with the results. Context: [email type, audience size, goal]." },

  // BRAND
  { n:36, title:"Brand Voice Guide Creation", cat:"brand", desc:"Build a brand voice and tone guide from scratch — or codify an existing voice using sample content — with do/don't examples.", prompt:"Create a brand voice guide for [company]. Include: 4 voice attributes (each with a 2-sentence description, do example, don't example), tone adjustments for different contexts (sales, support, social), and 5 words we never use." },
  { n:37, title:"Tagline & Slogan Generation", cat:"brand", desc:"Generate positioning-led tagline options across different creative directions — functional, emotional, aspirational, provocative.", prompt:"Generate 15 tagline options for [brand/product]. Cover 5 directions: functional clarity, emotional resonance, aspirational vision, competitive contrast, and something unexpected. Include a 1-line rationale for each." },
  { n:38, title:"Brand Narrative Writing", cat:"brand", desc:"Write a founder story, origin narrative, or brand manifesto that builds emotional connection without sounding like a press release.", prompt:"Write a brand origin narrative for [company]. Anchor it in the real problem the founder experienced. Avoid corporate language. Structure: tension (the problem), turn (the insight), resolution (what we built). Length: 300 words." },
  { n:39, title:"Naming Exploration", cat:"brand", desc:"Generate name concepts for products, campaigns, or companies across multiple naming conventions — compound, coined, metaphor, acronym.", prompt:"Generate 20 name concepts for [product/company/campaign]. Explore: compound words, coined terms, metaphors, real words used differently, and initialism options. Filter for: memorable, available (.com potential), under 3 syllables." },
  { n:40, title:"Brand Audit Framework", cat:"brand", desc:"Get a structured brand audit template covering messaging consistency, visual alignment, audience perception, and competitive differentiation.", prompt:"Create a brand audit framework for [company type]. Include evaluation criteria for: message consistency across channels, tone alignment, visual identity coherence, audience perception indicators, and competitive differentiation score." },

  // ANALYTICS
  { n:41, title:"Marketing Report Narratives", cat:"analytics", desc:"Paste your metrics and Claude writes the executive narrative — what the numbers mean, why they moved, and what to do next.", prompt:"Here are our marketing metrics for [period]: [PASTE DATA]. Write a 2-page executive summary: 1) What we achieved vs. goals, 2) Key drivers of performance (positive and negative), 3) Anomalies to explain, 4) Recommended next actions." },
  { n:42, title:"KPI Dashboard Design", cat:"analytics", desc:"Define which metrics to track for any marketing objective — with rationale for leading vs. lagging indicators.", prompt:"Design a KPI framework for [marketing objective]. Separate into: 1) Leading indicators (activity metrics), 2) Lagging indicators (outcome metrics), 3) Health metrics (risk signals). Max 10 total. Explain why each matters." },
  { n:43, title:"Attribution Model Explainers", cat:"analytics", desc:"Translate complex attribution models into plain-language explanations for stakeholders who don't live in the data.", prompt:"Explain [first-touch / last-touch / linear / time-decay / data-driven] attribution in plain language to a CMO. Include: how it works, what it rewards, what it misses, and when to use it vs. other models." },
  { n:44, title:"Data Story Presentations", cat:"analytics", desc:"Turn raw data into a narrative-driven presentation structure with clear insight headlines, not just chart labels.", prompt:"Turn this marketing data into a story-driven presentation outline: [PASTE DATA]. Each slide should have: an insight headline (not a category label), supporting data point, and 'so what' implication. 8 slides max." },
  { n:45, title:"Hypothesis Generation for Tests", cat:"analytics", desc:"Build structured hypotheses for marketing experiments — if/then/because format with expected impact and measurement plan.", prompt:"Generate 5 testable hypotheses for improving [metric] based on this context: [PASTE]. Format each as: IF we [change], THEN [metric] will [direction] by [estimate], BECAUSE [reasoning]. Add a measurement plan for each." },

  // OPS
  { n:46, title:"Campaign Brief Templates", cat:"ops", desc:"Create a reusable campaign brief template with all the fields a creative team, agency, or media buyer needs to execute without back-and-forth.", prompt:"Create a campaign brief template for [campaign type]. Include sections for: business objective, audience, key message, mandatory inclusions, channel breakdown, deliverables list, timeline, budget, and approval process." },
  { n:47, title:"Agency RFP Writing", cat:"ops", desc:"Draft an RFP for marketing agencies — PR, creative, media — with evaluation criteria, scope of work, and timeline requirements.", prompt:"Write an RFP for a [agency type] agency. Include: company background section, scope of work, mandatory capabilities, evaluation criteria (weighted), what to submit, timeline, and key questions for agencies to answer." },
  { n:48, title:"Vendor Evaluation Scorecards", cat:"ops", desc:"Build scoring frameworks for evaluating marketing tools, agencies, or platforms — with weighted criteria and scoring rubrics.", prompt:"Build a vendor evaluation scorecard for selecting a [tool/agency type]. Include 8–10 criteria, a 1–5 scoring rubric for each, suggested weighting, and a formula for a weighted total score." },
  { n:49, title:"SOPs for Marketing Workflows", cat:"ops", desc:"Document repeatable marketing processes as SOPs — great for onboarding, delegation, and knowledge transfer.", prompt:"Write a Standard Operating Procedure for [marketing process]. Include: purpose, who owns it, tools required, step-by-step instructions, quality checks, common mistakes, and a definition of done." },
  { n:50, title:"Marketing Hiring Job Descriptions", cat:"ops", desc:"Write clear, attractive job descriptions that reflect real scope — not a laundry list of requirements that screens out great candidates.", prompt:"Write a job description for a [role] at [company type]. Include: what you'll actually do (not a bullet dump), who thrives in this role (3–4 traits), required skills vs. nice-to-haves, and a compelling 'why join us' section." },
];

const catColors = {
  content: 'cat-content', strategy: 'cat-strategy', research: 'cat-research',
  social: 'cat-social', email: 'cat-email', brand: 'cat-brand',
  analytics: 'cat-analytics', ops: 'cat-ops'
};

let currentCat = 'all';
let currentSearch = '';

function renderCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  let visible = 0;
  skills.forEach(s => {
    const matchCat = currentCat === 'all' || s.cat === currentCat;
    const matchSearch = !currentSearch || 
      s.title.toLowerCase().includes(currentSearch) || 
      s.desc.toLowerCase().includes(currentSearch);
    if (!matchCat || !matchSearch) return;
    visible++;
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="card-header">
        <span class="skill-num">${String(s.n).padStart(2,'0')}</span>
        <span class="skill-title">${s.title}</span>
      </div>
      <p class="skill-desc">${s.desc}</p>
      <div class="card-footer">
        <span class="tag ${catColors[s.cat]}">${s.cat}</span>
        <button class="copy-prompt" data-prompt="${s.prompt.replace(/"/g,'&quot;')}">Copy prompt</button>
      </div>
      <button class="show-prompt">▶ Show starter prompt</button>
      <div class="prompt-text">${s.prompt}</div>
    `;
    grid.appendChild(div);
  });

  if (visible === 0) {
    grid.innerHTML = '<div class="no-results">No skills match that filter.</div>';
  }

  document.getElementById('visibleCount').textContent = `${visible} skill${visible !== 1 ? 's' : ''} shown`;

  // Bind events
  grid.querySelectorAll('.copy-prompt').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const text = btn.getAttribute('data-prompt');
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy prompt'; btn.classList.remove('copied'); }, 2000);
      });
    });
  });

  grid.querySelectorAll('.show-prompt').forEach(btn => {
    btn.addEventListener('click', () => {
      const card = btn.closest('.card');
      card.classList.toggle('expanded');
      btn.textContent = card.classList.contains('expanded') ? '▼ Hide prompt' : '▶ Show starter prompt';
    });
  });
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    renderCards();
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value.toLowerCase().trim();
  renderCards();
});

renderCards();
</script>
</body>
</html>
